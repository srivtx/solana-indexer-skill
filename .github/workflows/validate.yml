name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Validate the standalone install.sh
  skills:
    name: Install script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install.sh --help
        run: bash install.sh help

      - name: install.sh smoke test
        run: |
          set -e
          TMP=$(mktemp -d)
          CLAUDE_SKILLS_HOME=$TMP CODEX_SKILLS_HOME=$TMP ./install.sh
          [ -f "$TMP/solana-indexer/skill/SKILL.md" ] || (echo "missing SKILL.md" && exit 1)
          CLAUDE_SKILLS_HOME=$TMP CODEX_SKILLS_HOME=$TMP ./install.sh remove
          [ -z "$(ls -A $TMP)" ] || (echo "remove left files" && exit 1)
          rm -rf $TMP

  typecheck:
    name: TypeScript examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - skill/examples/minimal-indexer-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        working-directory: ${{ matrix.path }}
        run: npm install --no-fund --no-audit
      - name: Type check
        working-directory: ${{ matrix.path }}
        run: npx tsc --noEmit

  # Subgraph template isn't a raw tsc project — validate manifest + schema
  subgraph:
    name: Subgraph template validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify required files
        run: |
          for f in subgraph.yaml schema.graphql src/mapping.ts package.json; do
            [ -f "skill/examples/subgraph-template/$f" ] || \
              (echo "missing: $f" && exit 1)
          done
      - name: Validate manifest YAML
        run: |
          pip install pyyaml --quiet
          python3 -c "import yaml; yaml.safe_load(open('skill/examples/subgraph-template/subgraph.yaml'))"
          echo "subgraph.yaml parses"
      - name: Validate GraphQL schema
        run: |
          python3 -c "
          s = open('skill/examples/subgraph-template/schema.graphql').read()
          assert s.count('{') == s.count('}'), 'unbalanced braces'
          assert 'type Pool' in s, 'missing Pool type'
          assert 'type Swap' in s, 'missing Swap type'
          print('schema parses')
          "

  rust:
    name: Rust examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - skill/examples/geyser-plugin/skeleton
    env:
      # Use the modern sparse registry protocol (HTTP/1.1) instead of the
      # legacy git-based default. Solves the [16] Error in the HTTP2
      # framing layer that randomly hits when fetching deps from crates.io.
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.path }}
      - name: cargo check
        working-directory: ${{ matrix.path }}
        run: cargo check --all-targets

  links:
    name: Internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal markdown cross-links
        run: |
          python3 - <<'EOF'
          import os, re, sys
          ROOT = "."
          broken = 0
          total = 0
          for dirpath, dirs, files in os.walk(ROOT):
              if any(p in dirpath for p in ['node_modules', 'target', '.git', 'dist']):
                  continue
              for fn in files:
                  if not fn.endswith('.md'):
                      continue
                  fpath = os.path.join(dirpath, fn)
                  with open(fpath) as f:
                      content = f.read()
                  for m in re.finditer(r'\[([^\]]+)\]\(([^)]+\.md[^)]*)\)', content):
                      ref = m.group(2)
                      if ref.startswith('http'):
                          continue
                      target = os.path.normpath(os.path.join(os.path.dirname(fpath), ref))
                      total += 1
                      if not os.path.isfile(target):
                          print(f"BROKEN: {fpath} -> {ref}")
                          broken += 1
          print(f"\n{total} links, {broken} broken")
          sys.exit(1 if broken else 0)
          EOF

  frontmatter:
    name: Frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify frontmatter on skill files
        run: |
          python3 - <<'EOF'
          import os, re, sys
          errors = 0
          for dirpath, dirs, files in os.walk("."):
              if any(p in dirpath for p in ['node_modules', 'target', '.git']):
                  continue
              for fn in files:
                  if not fn.endswith('.md'):
                      continue
                  fpath = os.path.join(dirpath, fn)
                  relpath = os.path.relpath(fpath, ".")
                  is_skill_entry = relpath.endswith(os.path.join('skill', 'SKILL.md'))
                  is_agent = '/agents/' in relpath
                  if not (is_skill_entry or is_agent):
                      continue
                  with open(fpath) as f:
                      content = f.read()
                  if not re.match(r'^---\nname:\s*\S+', content):
                      print(f"MISSING name: {relpath}")
                      errors += 1
                  if 'description:' not in content[:500]:
                      print(f"MISSING description: {relpath}")
                      errors += 1
          if errors:
              print(f"\n{errors} frontmatter errors")
              sys.exit(1)
          print("all frontmatter valid")
          EOF
